name: Bug report
description: Report a reproducible bug in the template
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please keep the report focused and reproducible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke, and what did you expect instead?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal sequence we can follow.
      placeholder: |
        1. Configure ...
        2. Visit ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime, deployment target, browser, package manager, and any relevant env toggles.
      placeholder: Next.js 15 on Vercel, Node 20, npm 10, Stripe enabled, R2 disabled
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Redact secrets before pasting.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues first.
          required: true
        - label: I removed secrets and personal data from logs.
          required: true
